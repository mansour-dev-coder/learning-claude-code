<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#07090F" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Orbit Academy — Learn the Rocket Industry</title>

  <!-- React vendored locally: no CDN, no in-browser Babel (precompiled) -->
  <script src="vendor/react.production.min.js"></script>
  <script src="vendor/react-dom.production.min.js"></script>
  <script src="vendor/three.min.js"></script>
  <!-- HDR bloom post-processing (three.js examples, vendored) -->
  <script src="vendor/post/CopyShader.js"></script>
  <script src="vendor/post/LuminosityHighPassShader.js"></script>
  <script src="vendor/post/EffectComposer.js"></script>
  <script src="vendor/post/RenderPass.js"></script>
  <script src="vendor/post/ShaderPass.js"></script>
  <script src="vendor/post/MaskPass.js"></script>
  <script src="vendor/post/UnrealBloomPass.js"></script>

  <style>
    :root {
      --bg: #07090F;
      --surface: #0E1520;
      --surface-2: #131C2A;
      --cyan: #4AF0E0;
      --orange: #FF7A45;
      --gold: #F5C842;
      --green: #52E07C;
      --text: #E6ECF5;
      --muted: #8A99B0;
      --line: #1E2A3C;
      --serif: Georgia, 'Times New Roman', serif;
      --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      --mono: 'SF Mono', ui-monospace, Menlo, Consolas, monospace;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
      line-height: 1.6;
      overflow-x: hidden;
    }
    button { font-family: inherit; cursor: pointer; }

    /* ---------- Star field ---------- */
    .starfield {
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none; overflow: hidden;
      background: radial-gradient(ellipse at 70% -10%, #122033 0%, #07090F 55%);
    }
    .star {
      position: absolute; border-radius: 50%;
      background: #fff;
      animation: twinkle var(--dur) ease-in-out infinite alternate;
    }
    @keyframes twinkle { from { opacity: .15; } to { opacity: .9; } }

    /* ---------- Layout ---------- */
    .app { position: relative; z-index: 1; min-height: 100vh; }
    .header {
      position: sticky; top: 0; z-index: 20;
      backdrop-filter: blur(12px);
      background: rgba(7,9,15,.82);
      border-bottom: 1px solid var(--line);
      padding: env(safe-area-inset-top) 0 0;
    }
    .header-inner {
      max-width: 1200px; margin: 0 auto;
      padding: 14px 20px;
      display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand .logo {
      width: 38px; height: 38px; flex: 0 0 38px;
      display: grid; place-items: center;
      border: 1px solid var(--cyan); border-radius: 10px;
      color: var(--cyan); font-size: 20px;
      box-shadow: 0 0 18px rgba(74,240,224,.25);
    }
    .brand h1 {
      font-family: var(--serif); font-size: 20px; margin: 0; letter-spacing: .3px;
    }
    .brand .tag {
      font-family: var(--mono); font-size: 10px; letter-spacing: 2px;
      color: var(--muted); text-transform: uppercase;
    }
    .progress-wrap { margin-left: auto; min-width: 200px; flex: 1; max-width: 360px; }
    .progress-label {
      display: flex; justify-content: space-between;
      font-family: var(--mono); font-size: 11px; color: var(--muted);
      margin-bottom: 6px; letter-spacing: 1px;
    }
    .progress-track {
      height: 7px; border-radius: 99px; background: var(--surface-2);
      overflow: hidden; border: 1px solid var(--line);
    }
    .progress-fill {
      height: 100%; border-radius: 99px;
      background: linear-gradient(90deg, var(--cyan), var(--green));
      transition: width .5s ease;
      box-shadow: 0 0 12px rgba(74,240,224,.5);
    }

    .layout {
      max-width: 1200px; margin: 0 auto;
      display: grid; grid-template-columns: 280px 1fr; gap: 28px;
      padding: 28px 20px 80px;
    }

    /* ---------- Sidebar ---------- */
    .sidebar { position: sticky; top: 96px; align-self: start; }
    .sidebar-title {
      font-family: var(--mono); font-size: 11px; letter-spacing: 2px;
      color: var(--muted); text-transform: uppercase; margin: 0 0 14px 4px;
    }
    .nav-item {
      width: 100%; text-align: left; background: var(--surface);
      border: 1px solid var(--line); border-left: 3px solid transparent;
      border-radius: 12px; padding: 14px 14px; margin-bottom: 10px;
      color: var(--text); display: flex; gap: 12px; align-items: flex-start;
      transition: border-color .2s, background .2s, transform .1s;
    }
    .nav-item:hover:not(.locked) { background: var(--surface-2); transform: translateX(2px); }
    .nav-item.active { border-left-color: var(--accent); background: var(--surface-2); }
    .nav-item.locked { opacity: .5; cursor: not-allowed; }
    .nav-num {
      font-family: var(--mono); font-size: 12px; width: 26px; height: 26px;
      flex: 0 0 26px; border-radius: 7px; display: grid; place-items: center;
      border: 1px solid var(--line); color: var(--muted);
    }
    .nav-item.active .nav-num { border-color: var(--accent); color: var(--accent); }
    .nav-item.done .nav-num { background: var(--green); color: #06210F; border-color: var(--green); }
    .nav-body { flex: 1; min-width: 0; }
    .nav-name { font-size: 14px; font-weight: 600; }
    .nav-meta { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 3px; letter-spacing: .5px; }
    .nav-status { font-size: 14px; }

    .sidebar-footer { margin-top: 18px; padding-left: 4px; }
    .reset-btn {
      background: none; border: none; color: var(--muted);
      font-family: var(--mono); font-size: 11px; letter-spacing: 1px;
      text-decoration: underline; padding: 4px;
    }
    .reset-btn:hover { color: var(--orange); }

    /* ---------- Main content ---------- */
    .main { min-width: 0; }
    .module-head { margin-bottom: 22px; }
    .module-kicker {
      font-family: var(--mono); font-size: 11px; letter-spacing: 3px;
      text-transform: uppercase; color: var(--accent);
    }
    .module-title { font-family: var(--serif); font-size: 30px; margin: 6px 0 4px; line-height: 1.2; }
    .module-sub { color: var(--muted); font-size: 15px; margin: 0; }

    .tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .tab {
      background: var(--surface); border: 1px solid var(--line);
      border-radius: 99px; padding: 8px 16px; color: var(--muted);
      font-size: 13px; font-weight: 600; transition: all .18s;
    }
    .tab:hover { color: var(--text); }
    .tab.active { background: var(--accent); color: #06121A; border-color: var(--accent); }

    .card {
      background: var(--surface); border: 1px solid var(--line);
      border-left: 3px solid var(--accent);
      border-radius: 14px; padding: 24px 26px; margin-bottom: 18px;
    }
    .lesson-h {
      font-family: var(--serif); font-size: 20px; margin: 22px 0 10px;
    }
    .lesson-h:first-child { margin-top: 0; }
    .lesson-p { font-size: 15.5px; margin: 0 0 14px; color: #D5DEEC; }
    .lesson-p:last-child { margin-bottom: 0; }

    /* callout boxes */
    .box { border-radius: 12px; padding: 16px 18px; margin: 16px 0; border: 1px solid; }
    .box-label {
      font-family: var(--mono); font-size: 10px; letter-spacing: 2px;
      text-transform: uppercase; display: block; margin-bottom: 7px; font-weight: 700;
    }
    .box p { margin: 0; font-size: 14.5px; }
    .box.analogy { background: rgba(245,200,66,.07); border-color: rgba(245,200,66,.35); }
    .box.analogy .box-label { color: var(--gold); }
    .box.insight { background: rgba(74,240,224,.07); border-color: rgba(74,240,224,.35); }
    .box.insight .box-label { color: var(--cyan); }
    .box.warning { background: rgba(255,122,69,.08); border-color: rgba(255,122,69,.4); }
    .box.warning .box-label { color: var(--orange); }

    .term {
      background: var(--surface-2); border: 1px solid var(--line);
      border-radius: 12px; padding: 16px 18px; margin: 16px 0;
    }
    .term-name { font-family: var(--mono); font-size: 14px; color: var(--cyan); font-weight: 700; margin-bottom: 8px; }
    .term-plain { font-size: 14.5px; color: var(--gold); margin: 0 0 10px; font-style: italic; }
    .term-def { font-size: 14.5px; margin: 0; color: #D5DEEC; }
    .term-def b { color: var(--text); }

    ul.lesson-list { margin: 6px 0 14px; padding-left: 20px; }
    ul.lesson-list li { margin-bottom: 8px; font-size: 15px; color: #D5DEEC; }

    .specs { display: grid; gap: 10px; margin: 6px 0 14px; }
    .spec-row {
      display: grid; grid-template-columns: 160px 1fr; gap: 12px;
      padding: 10px 0; border-bottom: 1px dashed var(--line);
    }
    .spec-row:last-child { border-bottom: none; }
    .spec-k { font-family: var(--mono); font-size: 12px; color: var(--muted); letter-spacing: .5px; }
    .spec-v { font-size: 14.5px; }

    .timeline { margin: 6px 0 8px; }
    .tl-item { display: grid; grid-template-columns: 92px 1fr; gap: 14px; padding: 10px 0; align-items: start; }
    .tl-time {
      font-family: var(--mono); font-size: 12px; color: var(--accent);
      background: var(--surface-2); border: 1px solid var(--line);
      border-radius: 6px; padding: 4px 0; text-align: center;
    }
    .tl-text { font-size: 14.5px; color: #D5DEEC; }

    .parts { margin: 6px 0; }
    .part { display: grid; grid-template-columns: 150px 1fr; gap: 14px; padding: 11px 0; border-bottom: 1px dashed var(--line); }
    .part:last-child { border-bottom: none; }
    .part-name { font-family: var(--mono); font-size: 13px; color: var(--accent); font-weight: 700; }
    .part-text { font-size: 14.5px; color: #D5DEEC; }

    /* CTA + buttons */
    .btn {
      border-radius: 10px; padding: 13px 24px; font-size: 15px; font-weight: 700;
      border: 1px solid transparent; transition: transform .1s, filter .15s;
    }
    .btn:active { transform: translateY(1px); }
    .btn-primary { background: var(--accent); color: #06121A; }
    .btn-primary:hover { filter: brightness(1.08); }
    .btn-ghost { background: transparent; border-color: var(--line); color: var(--text); }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
    .cta-row { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px; }

    /* ---------- Quiz ---------- */
    .quiz-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 18px; flex-wrap: wrap; gap: 8px; }
    .q-count { font-family: var(--mono); font-size: 12px; color: var(--muted); letter-spacing: 1px; }
    .q-text { font-family: var(--serif); font-size: 22px; margin: 0 0 20px; line-height: 1.35; }
    .options { display: grid; gap: 12px; }
    .opt {
      text-align: left; background: var(--surface-2); border: 1px solid var(--line);
      border-radius: 11px; padding: 15px 18px; color: var(--text); font-size: 15px;
      display: flex; gap: 13px; align-items: center; transition: all .15s;
    }
    .opt:hover:not(:disabled) { border-color: var(--accent); }
    .opt:disabled { cursor: default; }
    .opt-key {
      font-family: var(--mono); font-size: 12px; width: 24px; height: 24px; flex: 0 0 24px;
      border: 1px solid var(--line); border-radius: 6px; display: grid; place-items: center; color: var(--muted);
    }
    .opt.correct { border-color: var(--green); background: rgba(82,224,124,.12); }
    .opt.correct .opt-key { border-color: var(--green); color: var(--green); }
    .opt.wrong { border-color: var(--orange); background: rgba(255,122,69,.12); }
    .opt.wrong .opt-key { border-color: var(--orange); color: var(--orange); }

    .feedback { margin-top: 18px; border-radius: 11px; padding: 15px 18px; border: 1px solid; }
    .feedback.right { background: rgba(82,224,124,.08); border-color: rgba(82,224,124,.4); }
    .feedback.wrong-fb { background: rgba(255,122,69,.08); border-color: rgba(255,122,69,.4); }
    .feedback .fb-label { font-family: var(--mono); font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 700; }
    .feedback.right .fb-label { color: var(--green); }
    .feedback.wrong-fb .fb-label { color: var(--orange); }
    .feedback p { margin: 7px 0 0; font-size: 14.5px; }

    /* ---------- Results ---------- */
    .results { text-align: center; padding: 30px 26px; }
    .score-ring {
      width: 150px; height: 150px; border-radius: 50%; margin: 8px auto 18px;
      display: grid; place-items: center;
      background: conic-gradient(var(--ring-color) var(--ring-deg), var(--surface-2) 0);
    }
    .score-inner {
      width: 122px; height: 122px; border-radius: 50%; background: var(--surface);
      display: grid; place-items: center; flex-direction: column;
    }
    .score-pct { font-family: var(--serif); font-size: 38px; line-height: 1; }
    .score-frac { font-family: var(--mono); font-size: 12px; color: var(--muted); margin-top: 4px; }
    .results h2 { font-family: var(--serif); font-size: 26px; margin: 6px 0 8px; }
    .results p.r-sub { color: var(--muted); max-width: 460px; margin: 0 auto 22px; }

    @media (max-width: 880px) {
      .layout { grid-template-columns: 1fr; gap: 18px; padding: 18px 14px 70px; }
      .sidebar { position: static; }
      .nav-list { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 6px; -webkit-overflow-scrolling: touch; }
      .nav-item { margin-bottom: 0; min-width: 210px; }
      .sidebar-footer { margin-top: 12px; text-align: center; }
      .module-title { font-size: 25px; }
      .spec-row, .part { grid-template-columns: 1fr; gap: 3px; }
      .tl-item { grid-template-columns: 74px 1fr; }
      .progress-wrap { max-width: none; }
    }

    /* ============ Interactive graphics (shared) ============ */
    .gfx {
      background: var(--surface-2); border: 1px solid var(--line);
      border-radius: 14px; padding: 18px; margin: 16px 0;
    }
    .gfx-controls { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
    .gfx-btn { padding: 11px 18px; font-size: 14px; }
    .gfx-btn:disabled { opacity: .5; }

    @keyframes gfxFlicker { from { opacity: .6; transform: scaleY(.9); } to { opacity: 1; transform: scaleY(1.08); } }
    @keyframes gfxFade { from { opacity: 0; } to { opacity: 1; } }
    .ls-flame { transform-box: fill-box; transform-origin: top center; animation: gfxFlicker .12s ease-in-out infinite alternate; }
    .ls-fade { animation: gfxFade .8s ease both; }

    /* 1) Rocket diagram */
    .rk-wrap { display: grid; grid-template-columns: 240px 1fr; gap: 20px; align-items: center; }
    .rk-svg { width: 100%; max-width: 240px; height: auto; }
    .rk-panel { animation: rkSlide .35s ease both; }
    @keyframes rkSlide { from { opacity: 0; transform: translateX(14px); } to { opacity: 1; transform: translateX(0); } }
    .rk-pname { font-family: var(--mono); font-size: 16px; font-weight: 700; margin-bottom: 10px; }
    .rk-plain { font-size: 14.5px; color: var(--gold); font-style: italic; margin: 0 0 10px; }
    .rk-def { font-size: 14.5px; color: #D5DEEC; margin: 0; }

    /* 2) Launch sequence */
    .ls-svg { width: 100%; max-width: 360px; height: auto; display: block; margin: 0 auto; border-radius: 10px; }
    .ls-readout { display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
    .ls-phase { font-family: var(--serif); font-size: 17px; }
    .ls-time { font-family: var(--mono); font-size: 12px; color: var(--cyan); margin-right: 6px; }
    .ls-meters { display: flex; gap: 16px; font-family: var(--mono); font-size: 12px; color: var(--muted); }
    .ls-meters b { color: var(--text); font-size: 14px; }
    .ls-desc { font-size: 14.5px; color: #D5DEEC; margin: 12px 0 0; min-height: 42px; }
    .ls-warn { animation: gfxFlicker .4s steps(1) infinite alternate; }
    .ls-fall { transform: translate(178px, 150px) rotate(40deg); animation: lsFall 2.4s ease-in forwards; }
    @keyframes lsFall { from { transform: translate(178px,150px) rotate(40deg); opacity: 1; } to { transform: translate(150px,330px) rotate(160deg); opacity: 0; } }
    .ls-fairL { transform: translate(150px,170px); animation: lsFairL 2.2s ease-out forwards; }
    .ls-fairR { transform: translate(150px,170px); animation: lsFairR 2.2s ease-out forwards; }
    @keyframes lsFairL { from { transform: translate(150px,170px) rotate(0); opacity: 1; } to { transform: translate(95px,210px) rotate(-90deg); opacity: 0; } }
    @keyframes lsFairR { from { transform: translate(150px,170px) rotate(0); opacity: 1; } to { transform: translate(205px,210px) rotate(90deg); opacity: 0; } }

    /* 3) Orbit visualiser */
    .ov-wrap { display: grid; grid-template-columns: 300px 1fr; gap: 20px; align-items: center; }
    .ov-svg { width: 100%; max-width: 300px; height: auto; }
    .ov-earth { animation: ovSpin 26s linear infinite; transform-box: fill-box; transform-origin: center; }
    @keyframes ovSpin { to { transform: rotate(360deg); } }
    .ov-card { border: 1px solid; border-left-width: 3px; border-radius: 12px; padding: 16px; background: var(--surface); animation: rkSlide .3s ease both; }
    .ov-name { font-family: var(--mono); font-weight: 700; font-size: 15px; margin-bottom: 12px; }
    .ov-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px dashed var(--line); font-size: 14px; }
    .ov-row span { color: var(--muted); font-family: var(--mono); font-size: 12px; }
    .ov-use { font-size: 14px; color: #D5DEEC; margin: 12px 0; }
    .ov-hint p { font-size: 14.5px; margin: 0 0 8px; }
    .ov-hint .muted { color: var(--muted); font-size: 13px; }

    /* 4) Delta-v budget */
    .dv-barwrap { margin-bottom: 8px; }
    .dv-bar { display: flex; height: 26px; border-radius: 7px; overflow: hidden; background: #0A1018; border: 1px solid var(--line); }
    .dv-seg { height: 100%; transition: width 1.4s ease; }
    .dv-legend { display: flex; gap: 16px; flex-wrap: wrap; margin: 10px 0 4px; font-size: 12px; color: var(--muted); }
    .dv-legend span { display: flex; align-items: center; gap: 6px; }
    .dv-legend i { width: 11px; height: 11px; border-radius: 3px; display: inline-block; }
    .dv-status { font-size: 13.5px; color: #C9D4E4; margin: 4px 0 0; min-height: 20px; }
    .dv-svg { width: 100%; max-width: 200px; height: auto; display: block; margin: 6px auto 0; }
    .dv-fall { animation: dvFall 2s ease-in forwards; }
    @keyframes dvFall { from { transform: translate(70px,196px) rotate(0); opacity: 1; } to { transform: translate(34px,330px) rotate(120deg); opacity: 0; } }
    .dv-speed { text-align: center; font-family: var(--mono); font-size: 13px; color: var(--muted); margin-top: 6px; }
    .dv-speed b { color: var(--cyan); font-size: 18px; }
    .dv-orbit { color: var(--green); margin-left: 8px; }

    @media (max-width: 720px) {
      .rk-wrap, .ov-wrap { grid-template-columns: 1fr; gap: 14px; }
      .rk-svg, .ov-svg { margin: 0 auto; }
    }

    /* ============ 3D scenes ============ */
    .space3d { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .l3d-wrap { position: relative; border-radius: 10px; overflow: hidden; }
    .l3d-canvas { display: block; width: 100%; height: 340px; border-radius: 10px; }
    .l3d-warn {
      position: absolute; top: 12px; left: 12px;
      font-family: var(--mono); font-size: 12px; color: #FF4D4D;
      background: rgba(255,77,77,.14); border: 1px solid #FF4D4D;
      border-radius: 6px; padding: 4px 10px;
      animation: gfxFlicker .4s steps(1) infinite alternate;
    }

    /* ============ Gamification UI ============ */
    .toast-stack {
      position: fixed; top: calc(env(safe-area-inset-top) + 74px); right: 16px;
      z-index: 50; display: flex; flex-direction: column; gap: 8px; pointer-events: none;
    }
    .toast {
      font-family: var(--mono); font-size: 12px; letter-spacing: .5px;
      padding: 9px 14px; border-radius: 9px; border: 1px solid;
      animation: toastIn .25s ease both;
      backdrop-filter: blur(8px);
    }
    @keyframes toastIn { from { opacity: 0; transform: translateX(16px); } to { opacity: 1; transform: none; } }
    .toast-xp { color: var(--cyan); border-color: rgba(74,240,224,.5); background: rgba(74,240,224,.1); }
    .toast-rankup { color: var(--gold); border-color: rgba(245,200,66,.6); background: rgba(245,200,66,.12); font-weight: 700; }

    .rank-name { color: var(--gold); font-weight: 700; }
    .progress-label.sub { margin-top: 5px; margin-bottom: 0; font-size: 10px; opacity: .85; }
    .mute-btn {
      background: var(--surface); border: 1px solid var(--line); border-radius: 10px;
      width: 38px; height: 38px; font-size: 16px; flex: 0 0 38px;
      display: grid; place-items: center;
    }
    .mute-btn:hover { border-color: var(--cyan); }

    .badge-shelf { margin-top: 16px; }
    .badge-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .badge-pip {
      width: 40px; height: 40px; display: grid; place-items: center; font-size: 19px;
      background: var(--surface); border: 1px solid rgba(245,200,66,.45); border-radius: 11px;
      box-shadow: 0 0 10px rgba(245,200,66,.15);
    }

    .mission-tag {
      font-family: var(--mono); font-size: 11px; letter-spacing: 3px;
      color: var(--cyan); margin-bottom: 14px;
    }
    .stars-earned { font-size: 26px; letter-spacing: 8px; margin: 2px 0 10px; }
    .star-slot { color: #22314a; transition: color .3s; }
    .star-slot.lit { color: var(--gold); text-shadow: 0 0 12px rgba(245,200,66,.6); }
    .reward-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin: 0 0 18px; }
    .reward-chip {
      font-family: var(--mono); font-size: 13px; padding: 8px 14px;
      border-radius: 99px; border: 1px solid;
    }
    .xp-chip { color: var(--cyan); border-color: rgba(74,240,224,.5); background: rgba(74,240,224,.08); }
    .badge-chip { color: var(--gold); border-color: rgba(245,200,66,.5); background: rgba(245,200,66,.08); }

    @media (max-width: 880px) {
      .toast-stack { top: auto; bottom: 18px; right: 12px; left: 12px; align-items: center; }
    }

    /* Respect users who prefer reduced motion: calm the decorative animation. */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: .001ms !important;
        scroll-behavior: auto !important;
      }
      .star { opacity: .55; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="app.js"></script>
  <script>
    // Safety net: if the app never mounts, show a message instead of a black screen.
    setTimeout(function () {
      var r = document.getElementById("root");
      if (r && !r.childNodes.length) {
        r.innerHTML = "<div style=\"max-width:520px;margin:18vh auto;padding:24px;font-family:system-ui,sans-serif;color:#E6ECF5;text-align:center\"><h2 style=\"font-family:Georgia,serif\">Orbit Academy could not start</h2><p style=\"color:#8A99B0\">The game scripts did not load. Check your connection and reload.</p></div>";
      }
    }, 4000);
  </script>
</body>
</html>
