name: Deploy Orbit Academy to GitHub Pages

# Publishes the game in ./game to GitHub Pages.
# One-time setup required by the repo owner:
#   Settings → Pages → Build and deployment → Source: "GitHub Actions"
# The live deployment runs from the default branch (main). The feature branch
# build still validates that the workflow works.

on:
  push:
    branches:
      - main
      - claude/cross-platform-game-su8TZ
    paths:
      - "game/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production run.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages via the API so no manual Settings toggle is needed.
          # Requires the repo to be public (free plan) or on a paid plan.
          enablement: true

      - name: Upload game folder as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./game

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
